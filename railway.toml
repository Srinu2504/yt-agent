[build]
builder = "NIXPACKS"

[deploy]
startCommand = "cd /app && PYTHONPATH=/app python -m streamlit run ui/app.py --server.port $PORT --server.address 0.0.0.0 --server.headless true"
healthcheckPath = "/_stcore/health"
healthcheckTimeout = 300
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 3
